services:
  - type: web
    name: skillscope-ai-backend
    runtime: python
    pythonVersion: 3.11.0   # ✅ ADD THIS LINE (IMPORTANT)

    region: oregon
    plan: free

    buildCommand: pip install -r requirements.txt
    startCommand: uvicorn main:app --host 0.0.0.0 --port 10000
    healthCheckPath: /health

    envVars:
      - key: GROQ_API_KEY
        sync: false

      - key: GROQ_MODEL
        value: llama3-70b-8192

      - key: REQUEST_TIMEOUT
        value: "30"