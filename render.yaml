services:
  - type: web
    name: skillscope-ai-backend
    runtime: python
    region: oregon           # Change to: frankfurt | singapore | ohio as needed
    plan: free               # Upgrade to starter or standard for production

    buildCommand: pip install -r requirements.txt

    startCommand: uvicorn main:app --host 0.0.0.0 --port 10000

    healthCheckPath: /health

    envVars:
      - key: GROQ_API_KEY
        sync: false          # Set this manually in Render dashboard (keeps it secret)

      - key: GROQ_MODEL
        value: llama3-70b-8192

      - key: REQUEST_TIMEOUT
        value: "30"

      - key: PYTHON_VERSION
        value: "3.11.0"
